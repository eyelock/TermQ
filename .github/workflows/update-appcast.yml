name: Update Appcast

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    # Allow manual trigger to regenerate appcast

# Only update appcast when the Release workflow succeeds
# (workflow_dispatch always proceeds — used for manual regeneration)

permissions:
  contents: write
  pull-requests: write

jobs:
  update-appcast:
    name: Update Appcast
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.APPCAST_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq pandoc

      - name: Generate appcast files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/generate-appcast.sh
          ./scripts/generate-appcast.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Docs/appcast.xml Docs/appcast-beta.xml 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with appcast updates
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.APPCAST_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="hotfix/appcast-update"
          RELEASE_TAG="${{ github.event.workflow_run.head_branch || 'manual' }}"

          git checkout -B "$BRANCH"
          git add Docs/appcast.xml Docs/appcast-beta.xml
          git commit -m "chore: Update appcast for release ${RELEASE_TAG}

          Auto-generated appcast files for Sparkle auto-updates.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push -f origin "$BRANCH"

          # Close any stale appcast PR before creating a new one
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh pr close "$EXISTING" --delete-branch 2>/dev/null || true
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: Update appcast for ${RELEASE_TAG}" \
            --body "Auto-generated appcast update from release workflow. Merges automatically once CI passes.")

          gh pr merge "$BRANCH" --auto --merge

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Appcast Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "✅ Appcast PR created and auto-merge enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to appcast files" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files" >> $GITHUB_STEP_SUMMARY
          echo "- \`Docs/appcast.xml\` - Stable releases" >> $GITHUB_STEP_SUMMARY
          echo "- \`Docs/appcast-beta.xml\` - All releases (including beta)" >> $GITHUB_STEP_SUMMARY
