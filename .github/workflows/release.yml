name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.6.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      sha: ${{ steps.get-tag.outputs.sha }}

    steps:
      - name: Get tag and SHA
        id: get-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine the tag - either from push event or workflow_dispatch input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Get the SHA for this tag — dereference annotated tags to the commit.
          # refs/tags returns { object: { type, sha } }. For annotated tags the
          # type is "tag" and sha is the tag object; for lightweight tags the type
          # is "commit" and sha is already the commit.
          TAG_REF=$(gh api repos/${{ github.repository }}/git/refs/tags/$TAG 2>/dev/null || echo "")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Tag $TAG not found"
            exit 1
          fi
          TAG_OBJ=$(echo "$TAG_REF" | jq -r '.object.sha')
          TAG_OBJ_TYPE=$(echo "$TAG_REF" | jq -r '.object.type')

          if [ "$TAG_OBJ_TYPE" = "tag" ]; then
            # Annotated tag — dereference to commit SHA
            SHA=$(gh api repos/${{ github.repository }}/git/tags/$TAG_OBJ --jq '.object.sha' 2>/dev/null || echo "")
            if [ -z "$SHA" ]; then
              echo "❌ Failed to dereference annotated tag $TAG"
              exit 1
            fi
            echo "📌 Tag: $TAG (annotated), Commit SHA: $SHA"
          else
            # Lightweight tag — SHA is already the commit
            SHA="$TAG_OBJ"
            echo "📌 Tag: $TAG (lightweight), SHA: $SHA"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Check CI status for commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          SHA="${{ steps.get-tag.outputs.sha }}"

          # Skip CI verification for pre-releases (beta, alpha, rc)
          if [[ "$TAG" =~ (alpha|beta|rc) ]]; then
            echo "⏭️ Skipping CI verification for pre-release"
            exit 0
          fi

          echo "Checking CI status for commit $SHA (tag $TAG)..."

          # Wait for CI run to appear (it may not exist yet if the tag push
          # raced the merge commit's CI trigger)
          for i in {1..30}; do
            RUN_ID=$(gh run list \
              --repo ${{ github.repository }} \
              --commit $SHA \
              --workflow ci.yml \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || echo "")

            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "📌 Found CI run $RUN_ID for commit $SHA"
              break
            fi

            echo "⏳ Attempt $i: No CI run found yet, waiting..."
            sleep 10
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "❌ No CI run found for commit $SHA after 5 minutes"
            exit 1
          fi

          # Wait for the run to complete (no timeout — gh run watch exits
          # when the run finishes)
          echo "Waiting for CI run $RUN_ID to complete..."
          gh run watch "$RUN_ID" --repo ${{ github.repository }} --exit-status
          echo "✅ CI passed for commit $SHA"

  build-and-release:
    name: Build and Release
    runs-on: macos-15
    needs: verify-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-ci.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access keychain without prompts
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (prepend to existing)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found"
            exit 1
          fi
          echo "✅ Found signing identity: $IDENTITY"

          # Export for subsequent steps
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Install provisioning profile (optional, enables DP Keychain)
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.DEVELOPER_ID_PROVISION_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # When DEVELOPER_ID_PROVISION_PROFILE_BASE64 is set, the released app gets
          # the keychain-access-groups entitlement authorized by an embedded
          # provisioning profile (TN3125 §"Entitlements on macOS") and uses the
          # macOS Data Protection Keychain for secrets at runtime.
          #
          # When the secret is NOT set, the workflow signs with the basic
          # TermQ.entitlements exactly as before this PR — the app still works
          # because EncryptionKeyStore falls back to a 0o600 file. This keeps the
          # release pipeline working even before the one-time portal setup
          # described in CONTRIBUTING.md §"Data Protection Keychain Setup" is
          # complete.
          #
          # The chosen mode is captured in the SECRETS_BACKEND env var and used by
          # later steps to pick the right entitlements file.
          if [ -z "$PROVISION_PROFILE_BASE64" ]; then
            echo "⚠️  DEVELOPER_ID_PROVISION_PROFILE_BASE64 not set — release will sign"
            echo "    with TermQ.entitlements (file-based key storage at runtime)."
            echo "    To enable Data Protection Keychain, follow"
            echo "    CONTRIBUTING.md §\"Data Protection Keychain Setup\"."
            echo "SECRETS_BACKEND=file" >> $GITHUB_ENV
            exit 0
          fi
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "❌ APPLE_TEAM_ID secret is not set (required when provisioning profile is used)."
            exit 1
          fi

          # Avoid bash -e aborting silently mid-pipeline; we handle errors per-step
          # with explicit messages so a misconfigured profile is easy to diagnose.
          set +e

          PROFILE_PATH="$RUNNER_TEMP/embedded.provisionprofile"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          if [ ! -s "$PROFILE_PATH" ]; then
            echo "❌ Failed to decode DEVELOPER_ID_PROVISION_PROFILE_BASE64."
            echo "   The secret is set but base64 --decode produced an empty file."
            echo "   Re-encode the .provisionprofile with: base64 -i <profile>"
            exit 1
          fi
          echo "Decoded profile: $(wc -c < "$PROFILE_PATH" | tr -d ' ') bytes"

          # Unwrap the CMS signature to get the property list payload.
          PROFILE_PLIST="$RUNNER_TEMP/profile-payload.plist"
          if ! security cms -D -i "$PROFILE_PATH" -o "$PROFILE_PLIST" 2>/tmp/cms.err; then
            echo "❌ security cms -D failed — the secret doesn't decode to a valid"
            echo "   CMS-signed provisioning profile."
            cat /tmp/cms.err
            exit 1
          fi

          # Convert to JSON for jq (plutil's dotted key-path can't address keys
          # that themselves contain dots — macOS Developer ID profiles store the
          # App ID under `com.apple.application-identifier`, TN3125 §"The how").
          PROFILE_JSON=$(plutil -convert json -o - "$PROFILE_PLIST" 2>/tmp/plutil.err)
          if [ -z "$PROFILE_JSON" ]; then
            echo "❌ plutil -convert json failed:"
            cat /tmp/plutil.err
            exit 1
          fi

          PROFILE_APP_ID=$(echo "$PROFILE_JSON" | jq -r '.Entitlements["com.apple.application-identifier"] // .Entitlements["application-identifier"] // ""')
          EXPECTED_APP_ID="${APPLE_TEAM_ID}.net.eyelock.termq.app"
          WILDCARD_APP_ID="${APPLE_TEAM_ID}.*"
          if [ "$PROFILE_APP_ID" != "$EXPECTED_APP_ID" ] && [ "$PROFILE_APP_ID" != "$WILDCARD_APP_ID" ]; then
            echo "❌ Provisioning profile App ID mismatch."
            echo "   Profile contains: '$PROFILE_APP_ID'"
            echo "   Expected:         '$EXPECTED_APP_ID' (or wildcard '$WILDCARD_APP_ID')"
            echo ""
            echo "   Full Entitlements dictionary from the profile:"
            echo "$PROFILE_JSON" | jq '.Entitlements'
            exit 1
          fi

          KAG_COUNT=$(echo "$PROFILE_JSON" | jq -r '.Entitlements["keychain-access-groups"] // [] | length')
          if [ "$KAG_COUNT" = "0" ]; then
            echo "❌ Provisioning profile does not authorize keychain-access-groups."
            echo "   Regenerate the Developer ID profile against an App ID with Keychain Sharing,"
            echo "   then update the secret."
            exit 1
          fi

          echo "PROVISION_PROFILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV
          echo "SECRETS_BACKEND=keychain" >> $GITHUB_ENV
          echo "✅ Provisioning profile validated (App ID: $PROFILE_APP_ID, keychain-access-groups entries: $KAG_COUNT)"

      - name: Render release entitlements
        if: env.SECRETS_BACKEND == 'keychain'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # codesign does not expand $(AppIdentifierPrefix) — that's an Xcode build
          # setting. Substitute it ourselves with the Team ID followed by a period,
          # matching what Xcode would do.
          RENDERED="$RUNNER_TEMP/TermQ-Release.entitlements"
          sed "s|\$(AppIdentifierPrefix)|${APPLE_TEAM_ID}.|g" TermQ-Release.entitlements > "$RENDERED"
          echo "RELEASE_ENTITLEMENTS=$RENDERED" >> $GITHUB_ENV
          echo "Rendered release entitlements (team prefix: ${APPLE_TEAM_ID}.):"
          cat "$RENDERED"

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ needs.verify-ci.outputs.tag }}"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build release
        run: make build-release

      - name: Create app bundle
        run: |
          # Clean any existing app bundle (repo has skeleton for local dev)
          rm -rf TermQ.app
          mkdir -p TermQ.app/Contents/MacOS
          mkdir -p TermQ.app/Contents/Resources
          mkdir -p TermQ.app/Contents/Frameworks
          cp .build/release/TermQ TermQ.app/Contents/MacOS/TermQ
          cp .build/release/termqcli TermQ.app/Contents/Resources/termqcli
          cp .build/release/termqmcp TermQ.app/Contents/Resources/termqmcp
          # Add rpath for embedded frameworks (Sparkle)
          install_name_tool -add_rpath @executable_path/../Frameworks TermQ.app/Contents/MacOS/TermQ 2>/dev/null || true
          # Copy Sparkle framework (required for auto-updates)
          if [ -d ".build/release/Sparkle.framework" ]; then
            cp -R .build/release/Sparkle.framework TermQ.app/Contents/Frameworks/
          fi
          # Copy localization resources bundle
          if [ -d ".build/release/TermQ_TermQ.bundle" ]; then
            cp -R .build/release/TermQ_TermQ.bundle TermQ.app/Contents/Resources/
          fi
          if [ -f AppIcon.icns ]; then cp AppIcon.icns TermQ.app/Contents/Resources/AppIcon.icns; fi

          # Embed Developer ID provisioning profile when present (enables Data
          # Protection Keychain via the keychain-access-groups entitlement —
          # TN3125 §"Profile location"). When SECRETS_BACKEND=file (the secret is
          # not configured), skip this step and the app uses the file fallback at
          # runtime.
          if [ "$SECRETS_BACKEND" = "keychain" ]; then
            cp "$PROVISION_PROFILE_PATH" TermQ.app/Contents/embedded.provisionprofile
          fi

          # Create Info.plist with version info
          # SPARKLE_VERSION converts dash pre-release notation to dot notation so
          # SUStandardVersionComparator can compare consecutive betas correctly:
          #   0.7.0-beta.9 → 0.7.0.b9 | 0.7.0-alpha.3 → 0.7.0.a3 | 0.7.0-rc.2 → 0.7.0.rc2
          SPARKLE_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | sed 's/-beta\./.b/;s/-alpha\./.a/;s/-rc\./.rc/')
          cp Info.plist.template TermQ.app/Contents/Info.plist
          plutil -replace CFBundleShortVersionString -string "$SPARKLE_VERSION" TermQ.app/Contents/Info.plist
          plutil -replace CFBundleVersion -string "$SPARKLE_VERSION" TermQ.app/Contents/Info.plist
          plutil -replace TermQBuildSHA -string "$(git rev-parse --short=7 HEAD)" TermQ.app/Contents/Info.plist

      - name: Sign app bundle
        run: |
          # Sign embedded binaries first (inside-out signing)
          echo "Signing termqcli..."
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements TermQ.entitlements \
            TermQ.app/Contents/Resources/termqcli

          echo "Signing termqmcp..."
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements TermQ.entitlements \
            TermQ.app/Contents/Resources/termqmcp

          # Sign Sparkle framework components individually (inside-out, never --deep)
          # --deep overrides each component's own entitlements and breaks the XPC trust
          # chain, causing "An error occurred while running the updater" at install time.
          if [ -d "TermQ.app/Contents/Frameworks/Sparkle.framework" ]; then
            SPARKLE="TermQ.app/Contents/Frameworks/Sparkle.framework"
            echo "Signing Sparkle.framework components..."

            # XPC services must be signed first (inside-out)
            for xpc in "$SPARKLE/XPCServices/"*.xpc; do
              [ -d "$xpc" ] && codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$xpc"
            done

            # Updater.app helper
            if [ -d "$SPARKLE/Updater.app" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$SPARKLE/Updater.app"
            fi

            # Autoupdate helper binary
            if [ -f "$SPARKLE/Autoupdate" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$SPARKLE/Autoupdate"
            fi

            # Sign the framework bundle itself last (no --deep)
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              "$SPARKLE"
            echo "✅ Sparkle.framework signed"
          fi

          # Sign the main app bundle. Use the rendered release entitlements
          # (with keychain-access-groups, authorized by the embedded profile)
          # when SECRETS_BACKEND=keychain; otherwise sign with the basic
          # entitlements — same behavior as before this PR.
          if [ "$SECRETS_BACKEND" = "keychain" ]; then
            APP_ENTITLEMENTS="$RELEASE_ENTITLEMENTS"
            echo "Signing TermQ.app with release entitlements (Data Protection Keychain)..."
          else
            APP_ENTITLEMENTS="TermQ.entitlements"
            echo "Signing TermQ.app with basic entitlements (file-based key storage)..."
          fi
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements "$APP_ENTITLEMENTS" \
            TermQ.app

          # Verify signature
          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 TermQ.app

          # When we asked for the keychain backend, confirm the entitlement
          # actually made it into the signed binary — silently losing it would
          # mean the released app falls back to file without anyone noticing.
          if [ "$SECRETS_BACKEND" = "keychain" ]; then
            echo "Verifying keychain-access-groups is present in signed binary..."
            codesign --display --entitlements - --xml TermQ.app \
              | plutil -extract keychain-access-groups xml1 -o - - >/dev/null \
              || { echo "❌ keychain-access-groups missing from signed entitlements"; exit 1; }
          fi
          echo "✅ App bundle signed successfully (backend: $SECRETS_BACKEND)"

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create zip for notarization submission
          echo "Creating zip for notarization..."
          ditto -c -k --keepParent TermQ.app TermQ-notarize.zip

          # Submit for notarization and wait
          echo "Submitting for notarization (this may take several minutes)..."
          xcrun notarytool submit TermQ-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 30m

          # Staple the notarization ticket to the app
          echo "Stapling notarization ticket..."
          xcrun stapler staple TermQ.app

          # Verify notarization
          echo "Verifying notarization..."
          spctl --assess --type execute --verbose=2 TermQ.app

          # Cleanup
          rm TermQ-notarize.zip
          echo "✅ App notarized and stapled successfully"

      - name: Create and sign DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg-contents
          cp -R TermQ.app dmg-contents/
          ln -s /Applications dmg-contents/Applications

          # Create the DMG
          echo "Creating DMG..."
          hdiutil create -volname "TermQ" -srcfolder dmg-contents -ov -format UDZO TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Sign the DMG
          echo "Signing DMG..."
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Notarize the DMG
          echo "Notarizing DMG..."
          xcrun notarytool submit TermQ-${{ steps.version.outputs.VERSION }}.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 30m

          # Staple the DMG
          echo "Stapling DMG..."
          xcrun stapler staple TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Clean up
          rm -rf dmg-contents
          echo "✅ DMG created, signed, and notarized"

      - name: Create zip archive
        run: ditto -c -k --keepParent TermQ.app TermQ-${{ steps.version.outputs.VERSION }}.zip

      - name: Sign zip for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          ZIP="TermQ-${{ steps.version.outputs.VERSION }}.zip"
          SIG=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - -p "$ZIP")
          echo "$SIG" > "${ZIP}.sig"
          echo "✅ EdDSA signature: $SIG"

      - name: Generate checksums
        run: |
          shasum -a 256 TermQ-${{ steps.version.outputs.VERSION }}.dmg > checksums.txt
          shasum -a 256 TermQ-${{ steps.version.outputs.VERSION }}.zip >> checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Source of truth is CHANGELOG.md — extract the [$VERSION] section.
          # This is correct for every release type (stable, beta, hotfix), unlike
          # ranging over `develop`, which over-reports for hotfixes (develop
          # contains commits that weren't backported) and misses CHANGELOG-only
          # forward-ports.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (printing) { exit }
              if (index($0, "## [" ver "]") == 1) { printing = 1; next }
            }
            printing { print }
          ' CHANGELOG.md \
            | sed -e '/./,$!d' \
            | awk 'BEGIN { blank=0 } /^$/ { blank++; next } { for (i=0;i<blank;i++) print ""; blank=0; print }' \
            > /tmp/changelog-section.md

          echo "CHANGELOG section for $VERSION: $(wc -l < /tmp/changelog-section.md | tr -d ' ') lines"

          {
            if [ -s /tmp/changelog-section.md ]; then
              cat /tmp/changelog-section.md
              printf "\n"
            else
              printf "_See \`CHANGELOG.md\` for changes in this release._\n\n"
            fi

            printf '%s\n\n' '---'
            printf "## Installation\n\n"
            printf "### macOS App (Recommended)\n"
            printf "1. Download \`TermQ-${{ steps.version.outputs.VERSION }}.dmg\`\n"
            printf "2. Open the DMG and drag \`TermQ.app\` to your Applications folder\n"
            printf "3. Double-click to launch\n\n"
            printf "### Alternative: Zip Archive\n"
            printf "1. Download \`TermQ-${{ steps.version.outputs.VERSION }}.zip\`\n"
            printf "2. Unzip and move \`TermQ.app\` to your Applications folder\n\n"
            printf "### CLI Tool\n"
            printf "The \`termqcli\` CLI is bundled inside the app. To install it:\n"
            printf "1. Open TermQ.app\n"
            printf "2. Go to **TermQ → Settings** (or press ⌘,)\n"
            printf "3. Click **Install Command Line Tool**\n\n"
            printf "Or manually:\n"
            printf "\`\`\`bash\n"
            printf "sudo cp /Applications/TermQ.app/Contents/Resources/termqcli /usr/local/bin/termqcli\n"
            printf "\`\`\`\n\n"
            printf "## Checksums\n"
            printf "See \`checksums.txt\` for SHA-256 checksums of all release artifacts.\n"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.verify-ci.outputs.tag }}
          name: TermQ v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(needs.verify-ci.outputs.tag, 'alpha') || contains(needs.verify-ci.outputs.tag, 'beta') || contains(needs.verify-ci.outputs.tag, 'rc') }}
          generate_release_notes: false
          body_path: /tmp/release-notes.md
          files: |
            TermQ-${{ steps.version.outputs.VERSION }}.dmg
            TermQ-${{ steps.version.outputs.VERSION }}.zip
            TermQ-${{ steps.version.outputs.VERSION }}.zip.sig
            checksums.txt

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
