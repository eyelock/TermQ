name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.6.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      sha: ${{ steps.get-tag.outputs.sha }}

    steps:
      - name: Get tag and SHA
        id: get-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine the tag - either from push event or workflow_dispatch input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Get the SHA for this tag — dereference annotated tags to the commit.
          # refs/tags returns { object: { type, sha } }. For annotated tags the
          # type is "tag" and sha is the tag object; for lightweight tags the type
          # is "commit" and sha is already the commit.
          TAG_REF=$(gh api repos/${{ github.repository }}/git/refs/tags/$TAG 2>/dev/null || echo "")
          if [ -z "$TAG_REF" ]; then
            echo "❌ Tag $TAG not found"
            exit 1
          fi
          TAG_OBJ=$(echo "$TAG_REF" | jq -r '.object.sha')
          TAG_OBJ_TYPE=$(echo "$TAG_REF" | jq -r '.object.type')

          if [ "$TAG_OBJ_TYPE" = "tag" ]; then
            # Annotated tag — dereference to commit SHA
            SHA=$(gh api repos/${{ github.repository }}/git/tags/$TAG_OBJ --jq '.object.sha' 2>/dev/null || echo "")
            if [ -z "$SHA" ]; then
              echo "❌ Failed to dereference annotated tag $TAG"
              exit 1
            fi
            echo "📌 Tag: $TAG (annotated), Commit SHA: $SHA"
          else
            # Lightweight tag — SHA is already the commit
            SHA="$TAG_OBJ"
            echo "📌 Tag: $TAG (lightweight), SHA: $SHA"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Check CI status for commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          SHA="${{ steps.get-tag.outputs.sha }}"

          # Skip CI verification for pre-releases (beta, alpha, rc)
          if [[ "$TAG" =~ (alpha|beta|rc) ]]; then
            echo "⏭️ Skipping CI verification for pre-release"
            exit 0
          fi

          echo "Checking CI status for commit $SHA (tag $TAG)..."

          # Wait for CI run to appear (it may not exist yet if the tag push
          # raced the merge commit's CI trigger)
          for i in {1..30}; do
            RUN_ID=$(gh run list \
              --repo ${{ github.repository }} \
              --commit $SHA \
              --workflow ci.yml \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || echo "")

            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "📌 Found CI run $RUN_ID for commit $SHA"
              break
            fi

            echo "⏳ Attempt $i: No CI run found yet, waiting..."
            sleep 10
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "❌ No CI run found for commit $SHA after 5 minutes"
            exit 1
          fi

          # Wait for the run to complete (no timeout — gh run watch exits
          # when the run finishes)
          echo "Waiting for CI run $RUN_ID to complete..."
          gh run watch "$RUN_ID" --repo ${{ github.repository }} --exit-status
          echo "✅ CI passed for commit $SHA"

  build-and-release:
    name: Build and Release
    runs-on: macos-15
    needs: verify-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-ci.outputs.tag }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access keychain without prompts
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (prepend to existing)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found"
            exit 1
          fi
          echo "✅ Found signing identity: $IDENTITY"

          # Export for subsequent steps
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ needs.verify-ci.outputs.tag }}"
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build release
        run: make build-release

      - name: Create app bundle
        run: |
          # Clean any existing app bundle (repo has skeleton for local dev)
          rm -rf TermQ.app
          mkdir -p TermQ.app/Contents/MacOS
          mkdir -p TermQ.app/Contents/Resources
          mkdir -p TermQ.app/Contents/Frameworks
          cp .build/release/TermQ TermQ.app/Contents/MacOS/TermQ
          cp .build/release/termqcli TermQ.app/Contents/Resources/termqcli
          cp .build/release/termqmcp TermQ.app/Contents/Resources/termqmcp
          # Add rpath for embedded frameworks (Sparkle)
          install_name_tool -add_rpath @executable_path/../Frameworks TermQ.app/Contents/MacOS/TermQ 2>/dev/null || true
          # Copy Sparkle framework (required for auto-updates)
          if [ -d ".build/release/Sparkle.framework" ]; then
            cp -R .build/release/Sparkle.framework TermQ.app/Contents/Frameworks/
          fi
          # Copy localization resources bundle
          if [ -d ".build/release/TermQ_TermQ.bundle" ]; then
            cp -R .build/release/TermQ_TermQ.bundle TermQ.app/Contents/Resources/
          fi
          if [ -f AppIcon.icns ]; then cp AppIcon.icns TermQ.app/Contents/Resources/AppIcon.icns; fi

          # Create Info.plist with version info
          # SPARKLE_VERSION converts dash pre-release notation to dot notation so
          # SUStandardVersionComparator can compare consecutive betas correctly:
          #   0.7.0-beta.9 → 0.7.0.b9 | 0.7.0-alpha.3 → 0.7.0.a3 | 0.7.0-rc.2 → 0.7.0.rc2
          SPARKLE_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | sed 's/-beta\./.b/;s/-alpha\./.a/;s/-rc\./.rc/')
          cp Info.plist.template TermQ.app/Contents/Info.plist
          plutil -replace CFBundleShortVersionString -string "$SPARKLE_VERSION" TermQ.app/Contents/Info.plist
          plutil -replace CFBundleVersion -string "$SPARKLE_VERSION" TermQ.app/Contents/Info.plist
          plutil -replace TermQBuildSHA -string "$(git rev-parse --short=7 HEAD)" TermQ.app/Contents/Info.plist

      - name: Sign app bundle
        run: |
          # Sign embedded binaries first (inside-out signing)
          echo "Signing termqcli..."
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements TermQ.entitlements \
            TermQ.app/Contents/Resources/termqcli

          echo "Signing termqmcp..."
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements TermQ.entitlements \
            TermQ.app/Contents/Resources/termqmcp

          # Sign Sparkle framework components individually (inside-out, never --deep)
          # --deep overrides each component's own entitlements and breaks the XPC trust
          # chain, causing "An error occurred while running the updater" at install time.
          if [ -d "TermQ.app/Contents/Frameworks/Sparkle.framework" ]; then
            SPARKLE="TermQ.app/Contents/Frameworks/Sparkle.framework"
            echo "Signing Sparkle.framework components..."

            # XPC services must be signed first (inside-out)
            for xpc in "$SPARKLE/XPCServices/"*.xpc; do
              [ -d "$xpc" ] && codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$xpc"
            done

            # Updater.app helper
            if [ -d "$SPARKLE/Updater.app" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$SPARKLE/Updater.app"
            fi

            # Autoupdate helper binary
            if [ -f "$SPARKLE/Autoupdate" ]; then
              codesign --force --options runtime --timestamp \
                --sign "$SIGNING_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$SPARKLE/Autoupdate"
            fi

            # Sign the framework bundle itself last (no --deep)
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" \
              "$SPARKLE"
            echo "✅ Sparkle.framework signed"
          fi

          # Sign the main app bundle
          echo "Signing TermQ.app..."
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements TermQ.entitlements \
            TermQ.app

          # Verify signature
          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 TermQ.app
          echo "✅ App bundle signed successfully"

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create zip for notarization submission
          echo "Creating zip for notarization..."
          ditto -c -k --keepParent TermQ.app TermQ-notarize.zip

          # Submit for notarization and wait
          echo "Submitting for notarization (this may take several minutes)..."
          xcrun notarytool submit TermQ-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 30m

          # Staple the notarization ticket to the app
          echo "Stapling notarization ticket..."
          xcrun stapler staple TermQ.app

          # Verify notarization
          echo "Verifying notarization..."
          spctl --assess --type execute --verbose=2 TermQ.app

          # Cleanup
          rm TermQ-notarize.zip
          echo "✅ App notarized and stapled successfully"

      - name: Create and sign DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg-contents
          cp -R TermQ.app dmg-contents/
          ln -s /Applications dmg-contents/Applications

          # Create the DMG
          echo "Creating DMG..."
          hdiutil create -volname "TermQ" -srcfolder dmg-contents -ov -format UDZO TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Sign the DMG
          echo "Signing DMG..."
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Notarize the DMG
          echo "Notarizing DMG..."
          xcrun notarytool submit TermQ-${{ steps.version.outputs.VERSION }}.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 30m

          # Staple the DMG
          echo "Stapling DMG..."
          xcrun stapler staple TermQ-${{ steps.version.outputs.VERSION }}.dmg

          # Clean up
          rm -rf dmg-contents
          echo "✅ DMG created, signed, and notarized"

      - name: Create zip archive
        run: ditto -c -k --keepParent TermQ.app TermQ-${{ steps.version.outputs.VERSION }}.zip

      - name: Sign zip for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          ZIP="TermQ-${{ steps.version.outputs.VERSION }}.zip"
          SIG=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - -p "$ZIP")
          echo "$SIG" > "${ZIP}.sig"
          echo "✅ EdDSA signature: $SIG"

      - name: Generate checksums
        run: |
          shasum -a 256 TermQ-${{ steps.version.outputs.VERSION }}.dmg > checksums.txt
          shasum -a 256 TermQ-${{ steps.version.outputs.VERSION }}.zip >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.verify-ci.outputs.tag }}
          name: TermQ v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(needs.verify-ci.outputs.tag, 'alpha') || contains(needs.verify-ci.outputs.tag, 'beta') || contains(needs.verify-ci.outputs.tag, 'rc') }}
          generate_release_notes: true
          files: |
            TermQ-${{ steps.version.outputs.VERSION }}.dmg
            TermQ-${{ steps.version.outputs.VERSION }}.zip
            TermQ-${{ steps.version.outputs.VERSION }}.zip.sig
            checksums.txt
          body: |
            ## Installation

            ### macOS App (Recommended)
            1. Download `TermQ-${{ steps.version.outputs.VERSION }}.dmg`
            2. Open the DMG and drag `TermQ.app` to your Applications folder
            3. Double-click to launch

            ### Alternative: Zip Archive
            1. Download `TermQ-${{ steps.version.outputs.VERSION }}.zip`
            2. Unzip and move `TermQ.app` to your Applications folder

            ### CLI Tool
            The `termqcli` CLI is bundled inside the app. To install it:
            1. Open TermQ.app
            2. Go to **TermQ → Settings** (or press ⌘,)
            3. Click **Install Command Line Tool**

            Or manually:
            ```bash
            sudo cp /Applications/TermQ.app/Contents/Resources/termqcli /usr/local/bin/termqcli
            ```

            ## Checksums
            See `checksums.txt` for SHA-256 checksums of all release artifacts.

      - name: Trigger appcast update
        env:
          GH_TOKEN: ${{ secrets.APPCAST_TOKEN }}
        run: |
          echo "Triggering appcast update workflow..."
          gh workflow run update-appcast.yml
          echo "✅ Appcast update triggered"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
